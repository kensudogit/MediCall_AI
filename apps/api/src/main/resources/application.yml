spring:
  application:
    name: medicall-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/medicall}
    username: ${SPRING_DATASOURCE_USERNAME:medicall}
    password: ${SPRING_DATASOURCE_PASSWORD:medicall_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Tokyo
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://login.microsoftonline.com/common/v2.0}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      cloudwatch:
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}

medicall:
  clinic:
    name: ${CLINIC_NAME:メディコール内科クリニック}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  google:
    speech:
      enabled: ${GOOGLE_SPEECH_ENABLED:false}
  aws:
    region: ${AWS_REGION:ap-northeast-1}
    connect-instance-id: ${CONNECT_INSTANCE_ID:}
    polly-voice-id: ${POLLY_VOICE_ID:Mizuki}
  polly:
    enabled: ${POLLY_ENABLED:false}
  security:
    dev-mode: ${DEV_MODE:true}
  tenant:
    default-slug: ${DEFAULT_TENANT_SLUG:demo}

logging:
  level:
    com.medicall: INFO
